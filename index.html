<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Songbook</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/editor.css">
    <!-- SortableJS for Drag and Drop -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>

<body>
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h1>Songbook</h1>
            </div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search songs...">
            </div>
            <ul id="song-list">
                <!-- Song list items will be injected here -->
            </ul>
            <div class="sidebar-actions">
                <button id="new-song-btn" class="btn-primary" style="width: 100%; margin-bottom: 10px;">+ New
                    Song</button>
                <button id="import-txt-btn" class="btn-secondary" style="width: 100%;">Import TXT</button>
                <input type="file" id="txt-upload-input" accept=".txt,.text" style="display: none;">
            </div>
        </aside>

        <main id="main-content">
            <div id="welcome-screen" class="screen active">
                <div class="welcome-content">
                    <div class="welcome-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18V5l12-2v13"></path>
                            <circle cx="6" cy="18" r="3"></circle>
                            <circle cx="18" cy="16" r="3"></circle>
                        </svg>
                    </div>
                    <h2>Selecciona una canción</h2>
                    <p>Elige una canción de la biblioteca para ver los acordes y la letra</p>
                </div>
            </div>

            <div id="song-view-screen" class="screen">
                <header class="top-bar">
                    <button id="back-btn" class="btn-icon mobile-only">←</button>
                    <h2 id="song-title">Song Title</h2>
                    <div class="actions">
                        <button id="transpose-down-btn" class="btn-secondary">-</button>
                        <span id="transpose-value">0</span>
                        <button id="transpose-up-btn" class="btn-secondary">+</button>
                        <button id="save-transposed-btn" class="btn-secondary" title="Save this key">💾</button>
                        <button id="edit-btn" class="btn-primary">Edit</button>
                    </div>
                </header>

                <div id="song-display" class="song-content">
                    <!-- Rendered song content goes here -->
                </div>
            </div>

            <div id="editor-screen" class="screen">
                <header class="top-bar">
                    <button id="cancel-edit-btn" class="btn-secondary">Cancel</button>
                    <div class="editor-tabs">
                        <button class="tab-btn active" data-tab="visual">Visual</button>
                        <button class="tab-btn" data-tab="code">Code</button>
                    </div>
                    <button id="save-btn" class="btn-primary">Save</button>
                </header>

                <div id="editor-visual" class="editor-pane active">
                    <div class="toolbar">
                        <div class="chord-palette">
                            <!-- Majors -->
                            <div class="draggable-chord" draggable="true">C</div>
                            <div class="draggable-chord" draggable="true">D</div>
                            <div class="draggable-chord" draggable="true">E</div>
                            <div class="draggable-chord" draggable="true">F</div>
                            <div class="draggable-chord" draggable="true">G</div>
                            <div class="draggable-chord" draggable="true">A</div>
                            <div class="draggable-chord" draggable="true">B</div>

                            <!-- Minors -->
                            <div class="draggable-chord" draggable="true">Cm</div>
                            <div class="draggable-chord" draggable="true">Dm</div>
                            <div class="draggable-chord" draggable="true">Em</div>
                            <div class="draggable-chord" draggable="true">Fm</div>
                            <div class="draggable-chord" draggable="true">Gm</div>
                            <div class="draggable-chord" draggable="true">Am</div>
                            <div class="draggable-chord" draggable="true">Bm</div>
                            <button id="add-custom-chord-btn" class="btn-small">+</button>
                        </div>
                    </div>
                    <div id="visual-editor-canvas">
                        <!-- Visual editor content -->
                    </div>
                </div>

                <div id="editor-code" class="editor-pane">
                    <textarea id="code-editor-textarea" placeholder="Type ChordPro here..."></textarea>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="js/app.js"></script>
</body>

</html>
